<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Nebula Obfuscator</title>

    <link
        rel="preconnect"
        href="https://fonts.googleapis.com"
    >

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin
    >

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet"
    >

    <link rel="stylesheet" href="style.css">

</head>
<body>

    <div class="backgroundGlow"></div>

    <div class="app">

        <div class="header">

            <div class="logoBox">

                <div class="logoGlow"></div>

                <div class="logo">
                    N
                </div>

            </div>

            <div>

                <h1>
                    Nebula Obfuscator
                </h1>

                <p>
                    Advanced Luau Protection
                </p>

            </div>

        </div>

        <div class="editorGrid">

            <div class="editorCard">

                <div class="editorTop">

                    <span>
                        Input Script
                    </span>

                </div>

                <textarea
                    id="input"
                    placeholder="Paste your Luau script here..."
                ></textarea>

            </div>

            <div class="editorCard">

                <div class="editorTop">

                    <span>
                        Obfuscated Output
                    </span>

                    <button id="copyBtn">
                        Copy
                    </button>

                </div>

                <textarea
                    id="output"
                    readonly
                    placeholder="Your obfuscated script will appear here..."
                ></textarea>

            </div>

        </div>

        <div class="bottomButtons">

            <button id="obfuscateBtn">
                Obfuscate Script
            </button>

            <button id="cleanBtn">
                Clear
            </button>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
