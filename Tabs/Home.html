<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AquaLua</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter,sans-serif;
}

body{
    background:#0b1120;
    color:white;

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:20px;
}

.card{
    width:min(950px,100%);

    background:#111827;

    border:1px solid #23304d;

    border-radius:24px;

    padding:50px;

    text-align:center;

    box-shadow:
    0 8px 30px rgba(0,0,0,.3);
}

h1{
    font-size:clamp(38px,6vw,54px);

    color:#60a5fa;

    font-weight:800;

    margin-bottom:25px;
}

.description{
    color:#d1d5db;

    font-size:18px;

    line-height:1.8;

    margin-bottom:40px;
}

.description b{
    color:white;
}

.toolList{
    width:fit-content;

    margin:20px auto;

    text-align:left;

    color:#d1d5db;

    line-height:1.8;
}

.sectionTitle{
    font-size:22px;

    color:#60a5fa;

    font-weight:700;

    margin-bottom:25px;
}

.links{
    display:flex;

    justify-content:center;

    gap:25px;

    flex-wrap:wrap;
}

.linkCard{
    width:280px;

    background:#172033;

    border:1px solid #23304d;

    border-radius:20px;

    padding:20px;

    text-decoration:none;

    transition:.15s;
}

.linkCard:hover{
    background:#1e3a5f;

    transform:translateY(-3px);
}

.linkCard img{
    width:100%;

    display:block;

    border-radius:16px;
}

.footer{
    margin-top:40px;

    color:#9ca3af;

    font-size:14px;
}

@media(max-width:768px){

    .card{
        padding:30px;
    }

    .description{
        font-size:16px;
    }

    .linkCard{
        width:100%;
        max-width:320px;
    }

}
</style>

</head>
<body>

<div class="card">

    <h1>AquaLua</h1>

    <div class="description">

        AquaLua is a collection of useful tools made for Roblox developers.

        <br><br>

        <b>Currently available:</b>

        <div class="toolList">
            <div>• LMG2L / G2L To Lua Converter</div>
            <div>• Comment Remover</div>
        </div>

        More tools are planned and will be added over time.

        <br><br>

        Created by <b>JustAGuest</b>.

    </div>

    <div class="sectionTitle">
        Visit my profiles
    </div>

    <div class="links">

        <a class="linkCard"
        href="https://rscripts.net/@justaguest"
        target="_blank">

            <img src="https://raw.githubusercontent.com/JustSomeGuest/JustSomeGuest/main/Assets/RScripts.png">

        </a>

        <a class="linkCard"
        href="https://robloxscripts.com/user/justaguest"
        target="_blank">

            <img src="https://raw.githubusercontent.com/JustSomeGuest/JustSomeGuest/main/Assets/RobloxScripts.png">

        </a>

    </div>

    <div class="footer">
        More tools coming soon.
    </div>

</div>

</body>
</html>
