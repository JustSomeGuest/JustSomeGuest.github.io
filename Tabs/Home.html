<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AquaLua</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter,sans-serif;
}

body{
    background:#0b1120;
    color:white;
    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:20px;
}

.card{
    width:min(900px,100%);

    background:#111827;

    border:1px solid #23304d;
    border-radius:24px;

    padding:50px;

    text-align:center;

    box-shadow:
    0 8px 30px rgba(0,0,0,.3);
}

h1{
    font-size:clamp(36px,6vw,52px);
    font-weight:800;

    color:#60a5fa;

    margin-bottom:20px;
}

p{
    color:#9ca3af;

    font-size:20px;

    margin-bottom:40px;

    line-height:1.5;
}

.links{
    display:flex;
    justify-content:center;
    gap:25px;

    flex-wrap:wrap;
}

.linkCard{
    width:280px;

    background:#172033;

    border:1px solid #23304d;

    border-radius:20px;

    padding:20px;

    text-decoration:none;

    transition:.15s;
}

.linkCard:hover{
    background:#1e3a5f;

    transform:translateY(-3px);
}

.linkCard img{
    width:100%;

    border-radius:16px;

    display:block;
}

.subtext{
    margin-top:40px;

    color:#6b7280;

    font-size:14px;
}

@media(max-width:768px){

    .card{
        padding:30px;
    }

    p{
        font-size:17px;
    }

    .linkCard{
        width:100%;
        max-width:320px;
    }

}
</style>

</head>
<body>

<div class="card">

    <h1>Welcome to AquaLua</h1>

    <p>
        I build Luau tools, converters, and utilities for Roblox developers.
    </p>

    <div class="links">

        <a class="linkCard"
        href="https://rscripts.net/@justaguest"
        target="_blank">

            <img src="https://raw.githubusercontent.com/JustSomeGuest/JustSomeGuest/main/Assets/RScripts.png">

        </a>

        <a class="linkCard"
        href="https://robloxscripts.com/user/justaguest"
        target="_blank">

            <img src="https://raw.githubusercontent.com/JustSomeGuest/JustSomeGuest/main/Assets/RobloxScripts.png">

        </a>

    </div>

    <div class="subtext">
        More tools coming soon.
    </div>

</div>

</body>
</html>
