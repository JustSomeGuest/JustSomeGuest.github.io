<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <style>

        body {
            margin: 0;

            padding: 50px;

            background: transparent;

            color: white;

            font-family: Inter, sans-serif;
        }

        .card {
            background: rgba(255,255,255,0.04);

            border: 1px solid rgba(255,255,255,0.08);

            border-radius: 24px;

            padding: 40px;

            backdrop-filter: blur(20px);

            box-shadow:
                0 0 40px rgba(59,130,246,0.15);
        }

        h1 {
            font-size: 48px;

            margin-bottom: 20px;
        }

        p {
            font-size: 20px;

            color: #cbd5e1;
        }

    </style>

</head>
<body>

    <div class="card">

        <h1>
            Welcome to JustAGuest's website!
        </h1>

        <p>
            I make helpful Luau tools.
        </p>

    </div>

</body>
</html>
