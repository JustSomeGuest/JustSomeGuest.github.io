<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>JustAGuest - Luau Tools</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at top, rgba(59,130,246,0.15), transparent 60%),
                        radial-gradient(circle at bottom, rgba(147,51,234,0.12), transparent 60%),
                        #0a0a0f;
            color: white;
            font-family: Inter, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            width: min(800px, 90%);
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 28px;
            padding: 50px;
            backdrop-filter: blur(22px);
            box-shadow:
                0 0 60px rgba(59,130,246,0.18),
                0 0 120px rgba(147,51,234,0.08);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .glow {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(59,130,246,0.25), transparent 70%);
            top: -150px;
            left: -150px;
            filter: blur(40px);
            pointer-events: none;
        }

        h1 {
            font-size: 52px;
            margin-bottom: 15px;
            letter-spacing: -1px;
        }

        p {
            font-size: 20px;
            color: #cbd5e1;
            margin-bottom: 35px;
        }

        .btn {
            display: inline-block;
            padding: 14px 26px;
            border-radius: 14px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: white;
            text-decoration: none;
            font-weight: 600;
            box-shadow: 0 0 25px rgba(59,130,246,0.25);
            transition: 0.2s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 35px rgba(59,130,246,0.35);
        }

        .subtext {
            margin-top: 18px;
            font-size: 14px;
            color: #94a3b8;
        }
    </style>

</head>
<body>

    <div class="card">

        <div class="glow"></div>

        <h1>Welcome to JustAGuest's website</h1>

        <p>I build Luau tools, converters, and UI utilities for Roblox developers.</p>

        <a class="btn" href="https://scriptblox.com/u/JustAGuest" target="_blank">
            Visit my ScriptBlox
        </a>

        <div class="subtext">
            More tools coming soon.
        </div>

    </div>

</body>
</html>
