<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <style>

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 30px;
            background: transparent;
            color: white;
            font-family: Inter, sans-serif;
        }

        .container {
            height: calc(100vh - 60px);
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .title {
            font-size: 42px;
            font-weight: 700;
        }

        .sub {
            color: #94a3b8;
            margin-bottom: 10px;
        }

        .editorWrap {
            flex: 1;
            display: flex;
            gap: 20px;
            min-height: 0;
        }

        .editor {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 22px;
            overflow: hidden;
            backdrop-filter: blur(20px);
            box-shadow:
                0 0 30px rgba(59,130,246,0.12);
        }

        .topbar {
            padding: 14px 18px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        textarea {
            flex: 1;
            resize: none;
            border: none;
            outline: none;
            background: transparent;
            color: white;
            padding: 18px;
            font-size: 14px;
            line-height: 1.5;
            font-family: Consolas, monospace;
            text-align: left;
            overflow-y: auto;
        }

        textarea::-webkit-scrollbar {
            width: 10px;
        }

        textarea::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.03);
        }

        textarea::-webkit-scrollbar-thumb {
            background: linear-gradient(
                180deg,
                #3b82f6,
                #9333ea
            );

            border-radius: 999px;

            box-shadow:
                0 0 15px rgba(147,51,234,0.5);
        }

        .buttons {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        button {
            border: none;
            border-radius: 14px;
            padding: 14px 22px;

            background: linear-gradient(
                135deg,
                #3b82f6,
                #9333ea
            );

            color: white;
            cursor: pointer;
            transition: 0.25s;
            font-weight: 600;
        }

        button:hover {
            transform: translateY(-2px);

            box-shadow:
                0 0 25px rgba(147,51,234,0.4);
        }

        .toggleWrap {
            display: flex;
            align-items: center;
            gap: 10px;

            background: rgba(255,255,255,0.04);

            border: 1px solid rgba(255,255,255,0.08);

            padding: 10px 14px;

            border-radius: 14px;
        }

        .toggleWrap input {
            width: 18px;
            height: 18px;
        }

    </style>

</head>
<body>

    <div class="container">

        <div class="title">
            LMG2L/G2L To Dot Syntax Converter
        </div>

        <div class="sub">
            Convert LocalMaze/G2L generated code into clean dot syntax.
        </div>

        <div class="buttons">

            <button onclick="convertCode()">
                Convert
            </button>

            <div class="toggleWrap">

                <input
                    type="checkbox"
                    id="autoNaming"
                    checked
                >

                <label for="autoNaming">
                    Automatic Naming
                </label>

            </div>

            <button onclick="clearAll()">
                Clear
            </button>

        </div>

        <div class="editorWrap">

            <div class="editor">

                <div class="topbar">
                    Input
                </div>

                <textarea id="input"></textarea>

            </div>

            <div class="editor">

                <div class="topbar">

                    Output

                    <button onclick="copyOutput()">
                        Copy
                    </button>

                </div>

                <textarea id="output" readonly></textarea>

            </div>

        </div>

    </div>

    <script>

        function convertCode() {

            let source =
                document.getElementById("input").value

            const autoNaming =
                document.getElementById("autoNaming").checked

            source = source.replace(
                /--\[\=[\s\S]*?\]\=]/g,
                ""
            )

            source = source.replace(
                /--\[\[[\s\S]*?\]\]/g,
                ""
            )

            source = source.replace(
                /--.*$/gm,
                ""
            )

            let varMap = {}
            let parentMap = {}
            let classMap = {}
            let nameCounts = {}

            let instanceRegex =
                /LMG2L\["(.*?)"\]\s*=\s*Instance\.new\("(.*?)",?\s*(.*?)?\)/g

            let match

            while ((match = instanceRegex.exec(source)) !== null) {

                const id = match[1]
                const className = match[2]
                const parentRaw = match[3]

                classMap[id] = className

                if (parentRaw) {

                    const parentMatch =
                        parentRaw.match(/LMG2L\["(.*?)"]/)

                    if (parentMatch) {

                        parentMap[id] = parentMatch[1]

                    }

                }

            }

            let nameRegex =
                /LMG2L\["(.*?)"\]\["Name"\]\s*=\s*\[\[(.*?)]]/g

            while ((match = nameRegex.exec(source)) !== null) {

                varMap[match[1]] =
                    match[2]
                    .replace(/\W/g, "")

            }

            function shorten(name) {

                const shortMap = {
                    UISizeConstraint: "SC",
                    UIStroke: "Stroke",
                    UICorner: "Corner",
                    UIPadding: "Padding",
                    UIListLayout: "Layout",
                    UITextSizeConstraint: "TSC"
                }

                return shortMap[name] || name

            }

            Object.keys(classMap).forEach(id => {

                if (!autoNaming) {

                    if (!varMap[id]) {

                        varMap[id] =
                            id
                            .replace(/_\d+$/, "")
                            .replace(/\W/g, "")

                    }

                    return

                }

                const className =
                    classMap[id]

                const short =
                    shorten(className)

                const parent =
                    parentMap[id]

                let finalName =
                    short

                if (parent) {

                    const parentName =
                        varMap[parent]

                    if (
                        parentName &&
                        (
                            short === "Corner" ||
                            short === "Stroke" ||
                            short === "Padding" ||
                            short === "Layout" ||
                            short === "SC" ||
                            short === "TSC"
                        )
                    ) {

                        finalName =
                            parentName + short

                    }

                }

                if (!nameCounts[finalName]) {

                    nameCounts[finalName] = 1

                } else {

                    nameCounts[finalName]++

                    finalName +=
                        nameCounts[finalName]

                }

                varMap[id] = finalName

            })

            source = source.replace(
                /local\s+LMG2L\s*=\s*{}\s*;?/g,
                ""
            )

            source = source.replace(
                /return\s+.*$/gm,
                ""
            )

            source = source.replace(
                /LMG2L\["(.*?)"\]\s*=\s*Instance\.new\((.*?)\);?/g,
                (_, id, content) => {

                    let name = varMap[id]

                    content = content.replace(
                        /LMG2L\["(.*?)"]/g,
                        (_, ref) => varMap[ref]
                    )

                    return `local ${name} = Instance.new(${content})`
                }
            )

            source = source.replace(
                /LMG2L\["(.*?)"\]\["(.*?)"\]\s*=\s*(.*?)\s*;?$/gm,
                (_, id, prop, value) => {

                    let name = varMap[id]

                    value = value.replace(
                        /LMG2L\["(.*?)"]/g,
                        (_, ref) => varMap[ref]
                    )

                    if (
                        value.trim() === ""
                    ) {
                        return ""
                    }

                    return `${name}.${prop} = ${value}`
                }
            )

            source = source.replace(
                /LMG2L\["(.*?)"]/g,
                (_, id) => varMap[id]
            )

            source = source.replace(
                /\[\[(.*?)\]\]/g,
                '"$1"'
            )

            source = source.replace(
                /;/g,
                ""
            )

            source = source.replace(
                /\n{3,}/g,
                "\n\n"
            )

            document.getElementById("output").value =
                source.trim()

        }

        function clearAll() {

            document.getElementById("input").value = ""

            document.getElementById("output").value = ""

        }

        function copyOutput() {

            navigator.clipboard.writeText(
                document.getElementById("output").value
            )

        }

    </script>

</body>
</html>
