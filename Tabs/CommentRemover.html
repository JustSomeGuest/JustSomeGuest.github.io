<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Luau Comment Cleaner</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter,sans-serif;
}

body{
    background:#0b1120;
    color:white;

    padding:20px;

    overflow-y:auto;
}

.container{
    min-height:calc(100vh - 40px);

    display:flex;

    flex-direction:column;

    gap:20px;
}

.header{
    background:#111827;

    border:1px solid #23304d;

    border-radius:24px;

    padding:30px;

    box-shadow:
    0 8px 30px rgba(0,0,0,.3);
}

.title{
    font-size:clamp(34px,5vw,52px);

    font-weight:800;

    color:#60a5fa;

    margin-bottom:10px;
}

.sub{
    color:#9ca3af;

    line-height:1.7;

    font-size:16px;
}

.buttons{
    display:flex;

    flex-wrap:wrap;

    gap:12px;
}

button{
    border:none;

    background:#2563eb;

    color:white;

    padding:14px 22px;

    border-radius:16px;

    font-size:15px;

    font-weight:600;

    cursor:pointer;

    transition:
    background .15s,
    transform .15s;
}

button:hover{
    background:#1d4ed8;

    transform:translateY(-2px);
}

.editorWrap{
    display:flex;

    gap:20px;
}

.editor{
    flex:1;

    min-height:500px;

    display:flex;

    flex-direction:column;

    background:#111827;

    border:1px solid #23304d;

    border-radius:24px;

    overflow:hidden;
}

.topbar{
    height:60px;

    padding:0 20px;

    display:flex;

    align-items:center;

    gap:12px;

    border-bottom:1px solid #23304d;

    color:#d1d5db;

    font-weight:600;
}

.copyBtn{
    margin-left:auto;

    width:70px;

    height:38px;

    display:flex;

    align-items:center;

    justify-content:center;

    padding:0;

    border:none;

    border-radius:12px;

    background:#172033;

    color:white;

    font-size:15px;

    font-weight:600;

    cursor:pointer;

    transition:
        background .15s,
        transform .15s;
}

.copyBtn:hover{
    background:#1e3a5f;

    transform:translateY(-1px);
}

textarea{
    flex:1;

    resize:none;

    border:none;

    outline:none;

    background:#111827;

    color:white;

    padding:20px;

    font-size:14px;

    line-height:1.6;

    font-family:Consolas,monospace;
}

textarea::placeholder{
    color:#6b7280;
}

textarea::-webkit-scrollbar{
    width:10px;
}

textarea::-webkit-scrollbar-track{
    background:#111827;
}

textarea::-webkit-scrollbar-thumb{
    background:#23304d;

    border-radius:999px;
}

textarea::-webkit-scrollbar-thumb:hover{
    background:#2563eb;
}

@media(max-width:900px){

    body{
        padding:15px;
    }

    .editorWrap{
        flex-direction:column;
    }

    .editor{
        min-height:400px;
    }

    .buttons{
        flex-direction:column;
    }

    button{
        width:100%;
    }

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<div class="title">
Luau Comment Cleaner
</div>

<div class="sub">
Remove Luau comments and automatically clean empty lines.
</div>

</div>

<div class="buttons">

<button onclick="cleanComments()">
Remove
</button>

<button onclick="clearAll()">
Clear
</button>

</div>

<div class="editorWrap">

<div class="editor">

<div class="topbar">
Input
</div>

<textarea
id="input"
placeholder="Paste your Luau code here..."
></textarea>

</div>

<div class="editor">

<div class="topbar">

Output

<button
class="copyBtn"
onclick="copyOutput()"
>
Copy
</button>

</div>

<textarea
id="output"
readonly
placeholder="Cleaned code will appear here..."
></textarea>

</div>

</div>

</div>

<script>
function cleanComments() {

    let source =
        document.getElementById("input").value

    source =
        source.replace(
            /--\[\[[\s\S]*?\]\]/g,
            ""
        )

    source =
        source.replace(
            /--.*$/gm,
            ""
        )

    source =
        source
            .split("\n")
            .filter(
                line =>
                    line.trim() !== ""
            )
            .join("\n")

    document.getElementById("output").value =
        source.trim()

}

function clearAll() {

    document.getElementById("input").value =
        ""

    document.getElementById("output").value =
        ""

}

function copyOutput() {

    navigator.clipboard.writeText(

        document.getElementById("output").value

    )

}

</script>

</body>
</html>
