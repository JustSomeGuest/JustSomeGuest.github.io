<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LMG2L/G2L To Lua Converter</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter,sans-serif;
}

body{
    background:#0b1120;
    color:white;

    padding:20px;

    overflow-y:auto;
}

.container{
    min-height:calc(100vh - 40px);

    display:flex;

    flex-direction:column;

    gap:20px;
}

.header{
    background:#111827;

    border:1px solid #23304d;

    border-radius:24px;

    padding:30px;

    box-shadow:
    0 8px 30px rgba(0,0,0,.3);
}

.title{
    font-size:clamp(34px,5vw,52px);

    font-weight:800;

    color:#60a5fa;

    margin-bottom:10px;
}

.sub{
    color:#9ca3af;

    line-height:1.7;

    font-size:16px;
}

.buttons{
    display:flex;

    flex-wrap:wrap;

    gap:12px;
}

button{
    border:none;

    background:#2563eb;

    color:white;

    padding:14px 22px;

    border-radius:16px;

    font-size:15px;

    font-weight:600;

    cursor:pointer;

    transition:
    background .15s,
    transform .15s;
}

button:hover{
    background:#1d4ed8;

    transform:translateY(-2px);
}

.toggleButton.off{
    background:#172033;

    color:#9ca3af;
}

.editorWrap{
    display:flex;

    gap:20px;
}

.editor{
    flex:1;

    min-height:500px;

    display:flex;

    flex-direction:column;

    background:#111827;

    border:1px solid #23304d;

    border-radius:24px;

    overflow:hidden;
}

.topbar{
    height:60px;

    padding:0 20px;

    display:flex;

    align-items:center;

    gap:12px;

    border-bottom:1px solid #23304d;

    color:#d1d5db;

    font-weight:600;
}

.copyBtn{
    margin-left:auto;

    height:32px;

    padding:0 8px;

    font-size:12px;

    border:none;

    border-radius:10px;

    background:#172033;

    color:white;

    cursor:pointer;
}
    
.copyBtn:hover{
    background:#1e3a5f;

    transform:translateY(-1px);
}

textarea{
    flex:1;

    resize:none;

    border:none;

    outline:none;

    background:#111827;

    color:white;

    padding:20px;

    font-size:14px;

    line-height:1.6;

    font-family:Consolas,monospace;
}

textarea::placeholder{
    color:#6b7280;
}

textarea::-webkit-scrollbar{
    width:10px;
}

textarea::-webkit-scrollbar-track{
    background:#111827;
}

textarea::-webkit-scrollbar-thumb{
    background:#23304d;

    border-radius:999px;
}

textarea::-webkit-scrollbar-thumb:hover{
    background:#2563eb;
}

@media(max-width:900px){

    body{
        padding:15px;
    }

    .editorWrap{
        flex-direction:column;
    }

    .editor{
        min-height:400px;
    }

    .buttons{
        flex-direction:column;
    }

    button{
        width:100%;
    }

}

</style>

</head>

<body>

<div class="container">

    <div class="header">

        <div class="title">
            LMG2L/G2L To Lua Converter
        </div>

        <div class="sub">
            Convert LMG2L and G2L generated code into clean, readable Lua instantly.
        </div>

    </div>

    <div class="buttons">

        <button onclick="convertCode()">
            Convert
        </button>

        <button
            id="autoNamingToggle"
            class="toggleButton"
            onclick="toggleAutoNaming()"
        >
            Automatic Naming: ON
        </button>

        <button onclick="clearAll()">
            Clear
        </button>

    </div>

    <div class="editorWrap">

        <div class="editor">

            <div class="topbar">
                Input
            </div>

            <textarea
                id="input"
                placeholder="Paste your LMG2L/G2L code here..."
            ></textarea>

        </div>

        <div class="editor">

            <div class="topbar">

                Output

                <button
                    class="copyBtn"
                    onclick="copyOutput()"
                >
                    Copy
                </button>

            </div>

            <textarea
                id="output"
                readonly
                placeholder="Converted code will appear here..."
            ></textarea>

        </div>

    </div>

</div>

<script>

let autoNaming = true

function toggleAutoNaming() {

    autoNaming = !autoNaming

    const btn =
        document.getElementById("autoNamingToggle")

    if (autoNaming) {

        btn.classList.remove("off")

        btn.textContent =
            "Automatic Naming: ON"

    } else {

        btn.classList.add("off")

        btn.textContent =
            "Automatic Naming: OFF"

    }

}

function convertCode() {

    let source =
        document.getElementById("input").value

    const autoNamingEnabled =
        autoNaming

    source = source.replace(/--\[\=[\s\S]*?\]\=]/g, "")
    source = source.replace(/--\[\[[\s\S]*?\]\]/g, "")
    source = source.replace(/--.*$/gm, "")

    let varMap = {}
    let classMap = {}
    let parentMap = {}
    let originalNames = {}

    let match

    const nameRegex =
        /LMG2L\["(.*?)"\]\["Name"\]\s*=\s*\[\[(.*?)\]\]/g

    while ((match = nameRegex.exec(source)) !== null) {

        originalNames[match[1]] =
            match[2].replace(/\W/g, "")

    }

    const instanceRegex =
        /LMG2L\["(.*?)"\]\s*=\s*Instance\.new\("([^"]+)"(?:,\s*(.*?))?\);/g

    while ((match = instanceRegex.exec(source)) !== null) {

        const id = match[1]
        const className = match[2]
        const parentRaw = match[3]

        classMap[id] = className

        if (parentRaw) {

            const parentMatch =
                parentRaw.match(/LMG2L\["(.*?)"\]/)

            if (parentMatch) {

                parentMap[id] = parentMatch[1]

            }

        }

    }

    const suffixMap = {
        UICorner: "Corner",
        UIStroke: "Stroke",
        UIPadding: "Padding",
        UIGradient: "Gradient",
        UIListLayout: "Layout",
        UIGridLayout: "Grid",
        UIPageLayout: "Pages",
        UISizeConstraint: "SizeCons",
        UITextSizeConstraint: "TextSizeCons",
        UIAspectRatioConstraint: "Ratio",
        UIScale: "Scale",
        UIFlexItem: "Flex"
    }

    function makeName(id) {

        if (varMap[id]) {

            return varMap[id]

        }

        const className =
            classMap[id]

        const original =
            originalNames[id]

        const parentId =
            parentMap[id]

        const parentName =
            parentId ? makeName(parentId) : ""

        let finalName = ""

        const special =
            suffixMap[className]

        if (special) {

            finalName =
                parentName
                    ? parentName + special
                    : special

        } else {

            finalName =
                (original && original !== className)
                    ? original
                    : className

        }

        finalName =
            finalName.replace(/\W/g, "")

        let base = finalName
        let counter = 2

        while (
            Object.values(varMap)
                .includes(finalName)
        ) {

            finalName =
                base + counter

            counter++

        }

        varMap[id] = finalName

        return finalName

    }

    Object.keys(classMap).forEach(id => {

        if (autoNamingEnabled) {

            makeName(id)

        } else {

            varMap[id] =
                originalNames[id]
                || classMap[id]

        }

    })

    source =
        source.replace(
            /local\s+LMG2L\s*=\s*{}\s*;?/g,
            ""
        )

    source =
        source.replace(
            /return\s+.*$/gm,
            ""
        )

    source =
        source.replace(

            /LMG2L\["(.*?)"\]\s*=\s*Instance\.new\((.*?)\);?/g,

            (_, id, content) => {

                const name =
                    varMap[id]

                content =
                    content.replace(

                        /LMG2L\["(.*?)"\]/g,

                        (_, ref) =>
                            varMap[ref]

                    )

                return `local ${name} = Instance.new(${content})`

            }

        )

    source =
        source.replace(

            /LMG2L\["(.*?)"\]\["(.*?)"\]\s*=\s*(.*?)\s*;?$/gm,

            (_, id, prop, value) => {

                const name =
                    varMap[id]

                value =
                    value.replace(

                        /LMG2L\["(.*?)"\]/g,

                        (_, ref) =>
                            varMap[ref]

                    )

                if (value.trim() === "") {

                    return ""

                }

                return `${name}.${prop} = ${value}`

            }

        )

    source =
        source.replace(

            /LMG2L\["(.*?)"\]/g,

            (_, id) =>
                varMap[id]

        )

    source =
        source.replace(

            /\[\[(.*?)\]\]/gs,

            (_, t) =>
                `"${t.replace(/"/g, '\\"')}"`

        )

    source =
        source.replace(/;/g, "")

    source =
        source.replace(/\n{3,}/g, "\n\n")

    document.getElementById("output").value =
        source.trim()

}

function clearAll() {

    document.getElementById("input").value = ""

    document.getElementById("output").value = ""

}

function copyOutput() {

    navigator.clipboard.writeText(
        document.getElementById("output").value
    )

}

</script>

</body>
</html>
